<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="lensFill" cx="42%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="60%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f4a261" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f4a261" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glint" cx="30%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="lensClip">
      <circle cx="210" cy="200" r="160"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#0a0a12" rx="80"/>

  <!-- Grid pattern -->
  <g opacity="0.15" stroke="#252538" stroke-width="1">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Outer ring glow -->
  <circle cx="210" cy="200" r="168" fill="none" stroke="#f4a261" stroke-width="3" opacity="0.3" filter="url(#outerGlow)"/>

  <!-- Lens outer ring -->
  <circle cx="210" cy="200" r="162" fill="none" stroke="#f4a261" stroke-width="6" opacity="0.9"/>

  <!-- Lens outer ring secondary -->
  <circle cx="210" cy="200" r="170" fill="none" stroke="#f4a261" stroke-width="1.5" opacity="0.3"/>

  <!-- Lens glass fill -->
  <circle cx="210" cy="200" r="160" fill="url(#lensFill)"/>
  <circle cx="210" cy="200" r="160" fill="url(#lensGlow)"/>

  <!-- Scan lines inside lens -->
  <g clip-path="url(#lensClip)" opacity="0.18">
    <line x1="50" y1="100" x2="370" y2="100" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="130" x2="370" y2="130" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="160" x2="370" y2="160" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="190" x2="370" y2="190" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="220" x2="370" y2="220" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="250" x2="370" y2="250" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="280" x2="370" y2="280" stroke="#f4a261" stroke-width="1.5"/>
    <line x1="50" y1="310" x2="370" y2="310" stroke="#f4a261" stroke-width="1.5"/>
  </g>

  <!-- Active scan line (bright) -->
  <g clip-path="url(#lensClip)">
    <line x1="50" y1="200" x2="370" y2="200" stroke="#f4a261" stroke-width="2.5" opacity="0.7"/>
    <!-- Scan line glow -->
    <line x1="50" y1="200" x2="370" y2="200" stroke="#f4a261" stroke-width="8" opacity="0.15"/>
  </g>

  <!-- Crosshair inside lens -->
  <g clip-path="url(#lensClip)" stroke="#f4a261" stroke-width="1.5" opacity="0.5" filter="url(#glow)">
    <!-- Horizontal crosshair segments -->
    <line x1="100" y1="200" x2="160" y2="200"/>
    <line x1="260" y1="200" x2="320" y2="200"/>
    <!-- Vertical crosshair segments -->
    <line x1="210" y1="100" x2="210" y2="160"/>
    <line x1="210" y1="240" x2="210" y2="300"/>
    <!-- Corner brackets -->
    <path d="M150 145 L150 155 L160 155" fill="none"/>
    <path d="M270 145 L270 155 L260 155" fill="none"/>
    <path d="M150 245 L150 255 L160 255" fill="none"/>
    <path d="M270 245 L270 255 L260 255" fill="none"/>
  </g>

  <!-- Center dot -->
  <circle cx="210" cy="200" r="5" fill="#f4a261" opacity="0.9" filter="url(#glow)"/>
  <circle cx="210" cy="200" r="2" fill="#ffffff" opacity="0.8"/>

  <!-- RSI arc indicators inside lens -->
  <g clip-path="url(#lensClip)">
    <path d="M 110 200 A 100 100 0 0 1 210 100" fill="none" stroke="#3dffa0" stroke-width="2.5" opacity="0.6" stroke-dasharray="4 6"/>
    <path d="M 210 100 A 100 100 0 0 1 310 200" fill="none" stroke="#ffcc44" stroke-width="2.5" opacity="0.6" stroke-dasharray="4 6"/>
    <path d="M 310 200 A 100 100 0 0 1 210 300" fill="none" stroke="#ff5370" stroke-width="2.5" opacity="0.6" stroke-dasharray="4 6"/>
  </g>

  <!-- Lens glass glint -->
  <circle cx="210" cy="200" r="160" fill="url(#glint)"/>

  <!-- Small inner ring -->
  <circle cx="210" cy="200" r="100" fill="none" stroke="#f4a261" stroke-width="1" opacity="0.15"/>

  <!-- Handle - thick angular bar -->
  <g filter="url(#glow)">
    <!-- Handle body -->
    <rect x="336" y="316" width="28" height="130" rx="14" ry="14"
          fill="#f4a261"
          transform="rotate(45 350 381)"/>
    <!-- Handle shine -->
    <rect x="340" y="320" width="10" height="120" rx="5" ry="5"
          fill="#ffcc88" opacity="0.4"
          transform="rotate(45 350 381)"/>
    <!-- Handle cap -->
    <circle cx="424" cy="424" r="14" fill="#f4a261" opacity="0.8"/>
  </g>

  <!-- Corner bracket decorations on icon -->
  <g stroke="#f4a261" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 20 20 L 20 55 L 55 55"/>
    <path d="M 492 20 L 492 55 L 457 55"/>
    <path d="M 20 492 L 20 457 L 55 457"/>
  </g>

  <!-- LD monogram badge -->
  <rect x="360" y="16" width="50" height="28" rx="4" fill="#f4a261"/>
  <text x="385" y="35" font-family="monospace" font-size="13" font-weight="bold" fill="#000" text-anchor="middle">LD</text>
</svg>
